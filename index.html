<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL F1 | Менеджер Лиги</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        .font-f1 { font-family: 'Orbitron', sans-serif; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f5f5f5; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 4px; }
        select:disabled, input:disabled { opacity: 1; color: #a3a3a3; background-color: #1a1a1a; cursor: not-allowed; border-color: #262626; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-neutral-900 border-b border-red-600/30 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-3">
                <span class="text-red-600 font-f1 text-2xl font-bold tracking-wider">CPL F1</span>
                <span class="bg-red-600 text-white font-f1 text-xs px-2 py-0.5 rounded font-bold">2026</span>
            </div>
            <div class="hidden md:flex space-x-1 text-sm font-medium">
                <button onclick="switchTab('drivers')" class="nav-btn px-3 py-2 rounded text-red-500 bg-neutral-800" id="btn-drivers">Пилоты</button>
                <button onclick="switchTab('teams')" class="nav-btn px-3 py-2 rounded text-neutral-400 hover:text-white" id="btn-teams">Команды</button>
                <button onclick="switchTab('schedule')" class="nav-btn px-3 py-2 rounded text-neutral-400 hover:text-white" id="btn-schedule">Расписание</button>
                <button onclick="switchTab('standings')" class="nav-btn px-3 py-2 rounded text-neutral-400 hover:text-white" id="btn-standings">Таблицы</button>
                <button onclick="switchTab('archive')" class="nav-btn px-3 py-2 rounded text-neutral-400 hover:text-white" id="btn-archive">Архив</button>
            </div>
            <div>
                <button onclick="toggleAdminMode()" id="admin-toggle-btn" class="border border-neutral-600 text-neutral-400 px-3 py-1.5 rounded text-xs uppercase tracking-wider font-semibold hover:border-red-600 hover:text-white transition">
                    Войти в Админку
                </button>
            </div>
        </div>
    </nav>

    <div id="admin-bar" class="hidden bg-gradient-to-r from-red-950 to-neutral-900 border-b border-red-600 p-4 shadow-inner">
        <div class="max-w-7xl mx-auto flex flex-wrap gap-3 items-center justify-between text-sm">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="font-bold uppercase tracking-wider text-xs text-red-400">Режим Редактирования</span>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="openModal('add-driver-modal')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded font-semibold text-xs">+ Пилот</button>
                <button onclick="openModal('add-team-modal')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded font-semibold text-xs">+ Команда</button>
                <button onclick="openModal('add-gp-modal')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1 rounded font-semibold text-xs">+ Гран-При</button>
                <button onclick="archiveCurrentSeason()" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded font-semibold text-xs">В Архив</button>
                <button onclick="exportData()" class="bg-neutral-700 hover:bg-neutral-600 text-white px-3 py-1 rounded font-semibold text-xs">Экспорт (Save)</button>
                <button onclick="openModal('import-modal')" class="bg-neutral-700 hover:bg-neutral-600 text-white px-3 py-1 rounded font-semibold text-xs">Импорт</button>
            </div>
        </div>
    </div>

    <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-6">
        
        <div id="tier-selector-container" class="flex justify-center space-x-2 mb-6">
            <button onclick="setTier('F1')" id="tier-F1-btn" class="font-f1 px-6 py-2 rounded-l border border-red-600 bg-red-600 text-white text-sm font-bold tracking-wide transition">FORMULA 1</button>
            <button onclick="setTier('F2')" id="tier-F2-btn" class="font-f1 px-6 py-2 rounded-r border border-neutral-700 bg-neutral-900 text-neutral-400 text-sm font-bold tracking-wide transition">FORMULA 2</button>
        </div>

        <section id="tab-drivers" class="tab-content"><div id="drivers-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div></section>
        <section id="tab-teams" class="tab-content hidden"><div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></section>
        <section id="tab-schedule" class="tab-content hidden"><div id="schedule-list" class="space-y-4 max-w-5xl mx-auto"></div></section>
        
        <section id="tab-standings" class="tab-content hidden">
            <div id="standings-admin-controls" class="hidden flex justify-end mb-4">
                <button onclick="openManualPoints()" class="bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded shadow-md font-bold text-sm tracking-wide">+/- Редактировать очки в таблицах</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div>
                    <h2 class="font-f1 text-xl font-bold mb-4 text-red-500 tracking-wide uppercase">Личный зачёт</h2>
                    <div class="bg-neutral-900 rounded-lg border border-neutral-800 overflow-hidden">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-neutral-800 text-neutral-400 font-semibold border-b border-neutral-700">
                                    <th class="p-3 w-12 text-center">Поз</th>
                                    <th class="p-3">Пилот</th>
                                    <th class="p-3 text-right w-20">Очки</th>
                                </tr>
                            </thead>
                            <tbody id="standings-drivers-body"></tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <h2 class="font-f1 text-xl font-bold mb-4
